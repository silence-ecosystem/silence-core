# File: /home/ewa/silence/.github/workflows/ci.yml
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm-node

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build affected
        run: pnpm exec turbo run build --filter=...[origin/main...HEAD]

      - name: Test affected
        run: pnpm exec turbo run test --filter=...[origin/main...HEAD]

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm-node
      - run: pnpm install --frozen-lockfile
      - name: Build s11-lint with dependencies
        run: pnpm --filter=@silence/s11-lint... run build
      - run: pnpm exec turbo run lint --filter=...[origin/main...HEAD]

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm-node
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
