name: SLSA_PROVENANCE_GENERATOR

# Generates SLSA Level 3 provenance ONLY for open-core artifacts.
# Enterprise/proprietary artifacts in 03_ee/ are explicitly excluded from
# build scope, subject collection, and provenance generation.

on:
  release:
    types: [created]

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  build:
    name: Build Open-Core Artifacts
    runs-on: ubuntu-latest
    outputs:
      subjects: ${{ steps.subjects.outputs.base64_subjects }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          # SLSA provenance requires full git history to correctly identify release tags and commit ancestry.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm-node

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build open-core packages only
        run: |
          set -euo pipefail
          # Build only 04_packages/@silence/* and their dependencies.
          # Explicitly exclude 03_ee/ and 05_apps/ from SLSA subject scope.
          pnpm exec turbo run build --filter=./04_packages/@silence/*...

      - name: Verify no enterprise artifact leakage
        run: |
          set -euo pipefail
          if find 04_packages/@silence -type d -name dist -print0 | xargs -0 grep -RqI "03_ee/\|@silence/billing\|@silence/intervention-timing"; then
            echo "::error::Open-core artifacts contain enterprise references. Refusing to attest."
            exit 1
          fi
          echo "✅ No enterprise artifact leakage detected"

      - name: Calculate subject hashes
        id: subjects
        run: |
          set -euo pipefail
          SUBJECTS=""
          while IFS= read -r -d '' file; do
            digest=$(sha256sum "$file" | awk '{print $1}')
            SUBJECTS+="$file:$digest,"
          done < <(find 04_packages/@silence -path '*/dist/*' -type f -print0 | sort -z)

          if [ -z "$SUBJECTS" ]; then
            echo "::error::No open-core artifacts found in 04_packages/@silence/*/dist"
            exit 1
          fi

          SUBJECTS=${SUBJECTS%,}
          encoded=$(echo -n "$SUBJECTS" | base64 -w0)
          echo "base64_subjects=${encoded}" >> "$GITHUB_OUTPUT"
          echo "Subjects: ${SUBJECTS//,/, }"

  provenance:
    name: Generate SLSA Provenance
    needs: [build]
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@5a7753e71fafe88713d94247596041ef0652613b # v2.0.0
    with:
      base64-subjects: '${{ needs.build.outputs.subjects }}'
      upload-assets: true
