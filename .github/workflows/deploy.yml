name: deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

env:
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: fetch-main
        run: git fetch origin main --depth=1

      - name: setup-pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: setup-node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: boundary-check
        run: pnpm boundary-check

      - name: build-s11-lint
        run: pnpm --filter=@silence/s11-lint... run build
      - name: s11-check
        run: pnpm s11-check

      - name: typecheck
        run: pnpm typecheck

      - name: build-affected
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: pnpm exec turbo run build --filter=...[origin/main...HEAD]

      - name: test-affected
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: pnpm exec turbo run test --filter=...[origin/main...HEAD]

      - name: verify-vercel-token
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: test "$(printf "%s" "$VERCEL_TOKEN" | wc -c)" -ge 2

      - name: verify-turbo-token
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: test "$(printf "%s" "$TURBO_TOKEN" | wc -c)" -ge 2

      - name: verify-git-config-clean
        run: |
          if grep -r "ghp_" .git/config 2>/dev/null; then
            echo "BLOCKED: ghp_ token detected in .git/config"
            exit 1
          fi

  coverage-sentinel:
    name: "📊 Coverage Sentinel (report-only)"
    runs-on: ubuntu-latest
    needs:
      - verify
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: setup-pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: setup-node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: build workspace packages
        run: pnpm exec turbo run build

      - name: run tests with coverage
        run: pnpm test:coverage

      - name: parse coverage summary
        id: parse
        run: |
          GLOBAL=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)
          echo "global=${GLOBAL}" >> "$GITHUB_OUTPUT"

      - name: upload coverage summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          if-no-files-found: error

      - name: post coverage comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@331f8f5b4215f0445d3c07b4967662a32a2d3e31 # v2.9.0
        with:
          header: coverage-report
          message: |
            📊 Coverage summary
            - Global: ${{ steps.parse.outputs.global }}%
            - Target: 80–90% (gate not enforced yet)

  pcs-gate:
    name: "🧪 PCS Gate (WORLDHALT)"
    runs-on: ubuntu-latest
    needs:
      - verify
      - coverage-sentinel
    if: always() && needs.verify.result == 'success' && needs.coverage-sentinel.result == 'success'

    outputs:
      pcs-score: ${{ steps.calc.outputs.pcs_score }}

    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: setup-pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: setup-node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20
          cache: pnpm

      - name: download coverage summary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-summary
          path: coverage

      - name: install
        run: pnpm install --frozen-lockfile

      - name: calculate PCS
        id: calc
        run: |
          PCS=$(pnpm --silent pcs-gate 2>/dev/null | jq -r '.pcs')
          echo "PCS=$PCS"
          echo "pcs_score=$PCS" >> "$GITHUB_OUTPUT"

  deploy-preview:
    name: "🔎 Preview Deploy (Vercel)"
    runs-on: ubuntu-latest
    needs:
      - verify
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: paths filter
        id: changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            core:
              - '04_packages/@silence/**'
              - '05_apps/**'

      - name: skip if no relevant changes
        if: steps.changes.outputs.core != 'true'
        run: echo "No core/apps changes, skipping preview deploy"

      - name: setup-pnpm
        if: steps.changes.outputs.core == 'true'
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: setup-node
        if: steps.changes.outputs.core == 'true'
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20
          cache: pnpm

      - name: install deps
        if: steps.changes.outputs.core == 'true'
        run: pnpm install --frozen-lockfile

      - name: pull-vercel-environment
        if: steps.changes.outputs.core == 'true'
        run: |
          pnpm dlx vercel pull --yes --environment=preview \
            --token="$VERCEL_TOKEN" \
            --local-config=06_infrastructure/vercel.json

      - name: vercel CLI build (preview)
        if: steps.changes.outputs.core == 'true'
        run: |
          pnpm dlx vercel build \
            --token="$VERCEL_TOKEN" \
            --scope="$VERCEL_ORG_ID" \
            --local-config=06_infrastructure/vercel.json

      - name: vercel deploy (preview)
        if: steps.changes.outputs.core == 'true'
        id: deploy
        run: |
          URL=$(pnpm dlx vercel deploy \
            --token="$VERCEL_TOKEN" \
            --scope="$VERCEL_ORG_ID" \
            --local-config=06_infrastructure/vercel.json \
            --prebuilt)
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"

      - name: post preview URL to PR
        if: steps.changes.outputs.core == 'true' && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@331f8f5b4215f0445d3c07b4967662a32a2d3e31 # v2.9.0
        with:
          header: preview-env
          message: |
            ✅ Vercel preview ready:
            `${{ steps.deploy.outputs.preview_url }}`

  quality-sentinel:
    name: Quality Sentinel
    runs-on: ubuntu-latest
    needs:
      - verify
      - pcs-gate
    if: always()

    steps:
      - name: Evaluate required gates
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
          PCS_GATE_RESULT: ${{ needs.pcs-gate.result }}
        run: |
          set -euo pipefail
          if [ "$VERIFY_RESULT" != "success" ]; then
            echo "WORLDHALT: verify job failed"
            exit 1
          fi
          if [ "$PCS_GATE_RESULT" != "success" ]; then
            echo "WORLDHALT: pcs-gate failed"
            exit 1
          fi
          echo "Quality Sentinel: PASS"

  deploy-vercel:
    name: deploy-vercel
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - pcs-gate
      - quality-sentinel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: setup-pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: setup-node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: pull-vercel-environment
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: vercel-build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: npx vercel build --token="$VERCEL_TOKEN" --local-config=06_infrastructure/vercel.json

      - name: vercel-deploy
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --local-config=06_infrastructure/vercel.json
