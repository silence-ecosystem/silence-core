name: S11_SENTINEL_SCAN

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  s11-validation:
    name: S11 Linguistic Sterility Check
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: CHECKOUT_CODE
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: SETUP_PNPM_NODE
        uses: ./.github/actions/setup-pnpm-node

      - name: INSTALL_DEPENDENCIES
        run: pnpm install --frozen-lockfile

      - name: BUILD_S11_LINTER
        run: pnpm --filter @silence/s11-lint... build

      - name: RUN_S11_SCANNER
        run: |
          set -euo pipefail
          pnpm s11-check

      - name: REPORT_SUCCESS
        if: success()
        run: 'echo "S11_SENTINEL: CI-STATE=PASS"'
