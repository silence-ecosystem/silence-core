name: IP_BOUNDARY_ENFORCEMENT

on:
  pull_request:
    branches: [ main, "release/*" ]

permissions:
  contents: read

jobs:
  boundary-check:
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: CHECKOUT
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: SETUP_NODE
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: '20.x'

      - name: SETUP_PNPM
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4.0.0

      - name: INSTALL_DEPENDENCIES
        run: |
          pnpm install --frozen-lockfile

      - name: RUN_DEPENDENCY_CRUISER
        run: |
          set -euo pipefail
          # RULE-DOM-001 enforcement: .dependency-cruiser.js już zawiera:
          #  - RULE-DOM-001-no-open-core-to-ee
          #  - RULE-DOM-001-no-apps-direct-to-ee
          #  - RULE-DOM-001-no-import-from-archive
          pnpm boundary-check

      - name: REPORT_SUCCESS
        if: success()
        run: 'echo "RULE-DOM-001: CI-STATE=PASS"'
