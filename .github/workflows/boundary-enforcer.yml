name: IP_BOUNDARY_ENFORCEMENT

on:
  pull_request:
    branches: [ main, "release/*" ]

permissions:
  contents: read

jobs:
  boundary-check:
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: CHECKOUT
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: SETUP_PNPM_NODE
        uses: ./.github/actions/setup-pnpm-node

      - name: INSTALL_DEPENDENCIES
        run: |
          pnpm install --frozen-lockfile

      - name: RUN_DEPENDENCY_CRUISER
        run: |
          set -euo pipefail
          # RULE-DOM-001 enforcement: .dependency-cruiser.js już zawiera:
          #  - RULE-DOM-001-no-open-core-to-ee
          #  - RULE-DOM-001-no-apps-direct-to-ee
          #  - RULE-DOM-001-no-import-from-archive
          pnpm boundary-check

      - name: REPORT_SUCCESS
        if: success()
        run: 'echo "RULE-DOM-001: CI-STATE=PASS"'
