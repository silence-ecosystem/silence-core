# [PATH]: .github/workflows/engine-build.yml
#
# CI pipeline for silence-engine: build, test, equivalence, sign, verify.
# Triggered on changes to 04_packages/@silence/engine/.

name: Engine Build + Equivalence

on:
  push:
    paths:
      - '04_packages/@silence/engine/**'
      - '.github/workflows/engine-build.yml'
  pull_request:
    paths:
      - '04_packages/@silence/engine/**'

jobs:
  native-test:
    name: Native Rust Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.78.0
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 04_packages/@silence/engine

      - name: Clippy (deny warnings)
        working-directory: 04_packages/@silence/engine
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Native tests
        working-directory: 04_packages/@silence/engine
        run: cargo test --release

      - name: Equivalence tests (native)
        working-directory: 04_packages/@silence/engine
        run: cargo test --test equivalence --release

  wasm-build:
    name: WASM Build + Optimization
    runs-on: ubuntu-latest
    needs: native-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.78.0
          targets: wasm32-unknown-unknown

      - name: Install wasm-opt
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Build WASM
        working-directory: 04_packages/@silence/engine
        run: |
          cargo build --target wasm32-unknown-unknown --release --features wasm
          wasm-opt -Oz \
            target/wasm32-unknown-unknown/release/silence_engine.wasm \
            -o silence_engine.optim.wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: silence-engine-wasm
          path: 04_packages/@silence/engine/silence_engine.optim.wasm

      - name: Compute golden hash
        working-directory: 04_packages/@silence/engine
        run: |
          sha256sum silence_engine.optim.wasm > silence_engine.optim.wasm.hash
          cat silence_engine.optim.wasm.hash

  reproducibility:
    name: Reproducibility Verification
    runs-on: ubuntu-latest
    needs: wasm-build
    strategy:
      matrix:
        run: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - name: Build in Docker
        working-directory: 04_packages/@silence/engine
        run: |
          docker build -t silence-engine:repro-${{ matrix.run }} .
          docker create --name extract-${{ matrix.run }} silence-engine:repro-${{ matrix.run }}
          docker cp extract-${{ matrix.run }}:/dist/silence_engine.optim.wasm ./silence_engine.repro${{ matrix.run }}.wasm
          docker rm extract-${{ matrix.run }}

      - name: Compute hash
        working-directory: 04_packages/@silence/engine
        run: sha256sum silence_engine.repro${{ matrix.run }}.wasm > repro${{ matrix.run }}.hash

      - name: Upload reproducibility artifact
        uses: actions/upload-artifact@v4
        with:
          name: repro-hash-${{ matrix.run }}
          path: 04_packages/@silence/engine/repro${{ matrix.run }}.hash

  compare-hashes:
    name: Golden Hash Comparison
    runs-on: ubuntu-latest
    needs: reproducibility
    steps:
      - name: Download all hashes
        uses: actions/download-artifact@v4
        with:
          path: hashes
          pattern: repro-hash-*

      - name: Compare
        run: |
          cat hashes/repro-hash-1/repro1.hash
          cat hashes/repro-hash-2/repro2.hash
          cat hashes/repro-hash-3/repro3.hash
          HASH1=$(awk '{print $1}' hashes/repro-hash-1/repro1.hash)
          HASH2=$(awk '{print $1}' hashes/repro-hash-2/repro2.hash)
          HASH3=$(awk '{print $1}' hashes/repro-hash-3/repro3.hash)
          if [ "$HASH1" = "$HASH2" ] && [ "$HASH2" = "$HASH3" ]; then
            echo "REPRODUCIBILITY_OK hash=$HASH1"
          else
            echo "REPRODUCIBILITY_FAIL"
            exit 1
          fi

  sign-and-verify:
    name: Sign + Verify
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: silence-engine-wasm
          path: dist/

      - name: Generate signing keys (dev)
        run: |
          mkdir -p 01_governance/RELEASE_KEYS
          openssl genpkey -algorithm Ed25519 -out 01_governance/RELEASE_KEYS/engine-signing-key.pem
          openssl pkey -in 01_governance/RELEASE_KEYS/engine-signing-key.pem -pubout -out 01_governance/RELEASE_KEYS/engine-signing-key.pub

      - name: Sign WASM
        run: |
          chmod +x 04_packages/@silence/engine/scripts/sign-engine.sh
          04_packages/@silence/engine/scripts/sign-engine.sh dist/silence_engine.optim.wasm

      - name: Verify signature
        run: |
          HASH=$(cat dist/silence_engine.optim.wasm.hash)
          openssl pkeyutl -verify \
            -in <(echo "$HASH" | xxd -r -p) \
            -inkey 01_governance/RELEASE_KEYS/engine-signing-key.pub -pubin \
            -sigfile dist/silence_engine.optim.wasm.sig \
            -rawin
          echo "SIGNATURE_OK"
