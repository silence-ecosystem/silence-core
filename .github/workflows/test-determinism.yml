name: Test – Determinism + Boundary Check

on: [push, pull_request]

jobs:
  determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run determinism tests
        run: pnpm test:determinism

      - name: Run boundary check
        run: pnpm boundary-check

      - name: Fail if either check fails
        if: failure()
        run: |
          echo "Determinism or boundary check failed. Blocking merge."
          exit 1
