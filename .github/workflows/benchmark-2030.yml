name: Benchmark 2030 Master Gate
true:
  push:
    branches:
    - main
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
permissions:
  contents: read
  checks: write
  pull-requests: write
jobs:
  boundary-check:
    name: Boundary Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm
    - run: pnpm install --frozen-lockfile
    - run: pnpm boundary-check
  s11-check:
    name: S11 Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm
    - run: pnpm install --frozen-lockfile
    - run: pnpm s11-check
  determinism:
    name: Determinism
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm
    - run: pnpm install --frozen-lockfile
    - name: Run determinism gate
      run: "if pnpm run | grep -q \"test:determinism\"; then\n  pnpm test:determinism\n\
        elif pnpm run | grep -q \"testdeterminism\"; then\n  pnpm testdeterminism\n\
        else\n  echo \"Missing determinism script\"\n  exit 1\nfi\n"
