name: Boundary Enforcement (ADR-004)

on:
  pull_request:
    paths:
      - '05_apps/**'
      - '04_packages/**'
      - 'tsconfig.json'
      - 'pnpm-lock.yaml'
  push:
    branches: [main]

jobs:
  boundary-check:
    runs-on: ubuntu-latest
    name: ADR-004 Boundary Enforcement
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4.0.0
        with:
          version: 9.15.9

      - name: Install Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Boundary Check — Forbidden Imports
        run: |
          echo "🔍 Checking for forbidden imports from 03_ee..."
          VIOLATIONS=$(find 05_apps 04_packages \
            -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/.next/*" \
            ! -path "*/dist/*" \
            -exec grep -E "^[^/]*\s*(from|import|require).*(\bsilence-enterprise\b|03_ee)" {} + \
            2>/dev/null | grep -vE "^\s*(\*|//|/\*)" | wc -l)
          
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "❌ Found $VIOLATIONS forbidden imports"
            find 05_apps 04_packages \
              -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) \
              ! -path "*/node_modules/*" \
              ! -path "*/.next/*" \
              ! -path "*/dist/*" \
              -exec grep -n -E "^[^/]*\s*(from|import|require).*(\bsilence-enterprise\b|03_ee)" {} + \
              | grep -vE ":\s*(\*|//|/\*)"
            exit 1
          fi
          echo "✅ No forbidden imports"

      - name: Boundary Check — Package Dependencies
        run: |
          echo "🔍 Checking package.json for @silence-enterprise..."
          DEPS=$(find 05_apps 04_packages -name "package.json" \
            -exec grep -l "@silence-enterprise" {} \; 2>/dev/null | wc -l)
          
          if [ "$DEPS" -gt 0 ]; then
            echo "❌ Found @silence-enterprise in dependencies"
            exit 1
          fi
          echo "✅ Clean package.json"

      - name: TypeScript Check
        run: pnpm typecheck

      - name: Report
        if: success()
        run: |
          echo "✅ ADR-004 BOUNDARY ENFORCEMENT PASSED"
          echo "   - No forbidden imports"
          echo "   - No @silence-enterprise dependencies"
          echo "   - TypeScript strict mode OK"
