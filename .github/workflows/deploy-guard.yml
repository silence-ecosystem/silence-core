# .github/workflows/deploy-guard.yml
name: deploy-guard
on: [push, pull_request]

permissions: read-all

jobs:
  boundary-check:
    runs-on: ubuntu-latest
    timeout-minutes: 7 # FIB(13) × GOLDENSECONDMS ÷ 1000
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm-node
      - run: pnpm install --frozen-lockfile
      - name: RULE-DOM-001 boundary scan
        run: pnpm boundary-check
      - name: Build s11-lint with dependencies
        run: pnpm --filter=@silence/s11-lint... run build
      - name: S11 vocabulary scan
        run: pnpm s11-check

  determinism-gate:
    needs: boundary-check
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm-node
      - run: pnpm install --frozen-lockfile
      - name: core determinism test
        run: pnpm --filter=@silence/core test:determinism

  build-gate:
    needs: determinism-gate
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm-node
      - run: pnpm install --frozen-lockfile
      - name: Build s11-lint with dependencies
        run: pnpm --filter=@silence/s11-lint... run build
      - run: pnpm exec turbo run build --filter=...[origin/main...HEAD]
