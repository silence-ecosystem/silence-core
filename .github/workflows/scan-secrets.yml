name: scan-secrets

# Secret leak detection using TruffleHog.
# Scan scope: delta between HEAD and HEAD~1 to stay within fetch-depth: 2
# while still catching newly introduced credentials.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  trufflehog:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    timeout-minutes: 7 # FIB(13) * GOLDENSECOND_MS / 1000
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@ddc015e5ed99942b2253d8ea16a0586a01ef2ab1 # v3.88.0
        with:
          path: ./
          base: HEAD~1
          head: HEAD
          extra_args: --only-verified
