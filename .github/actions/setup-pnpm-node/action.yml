name: 'Setup pnpm + Node'
description: 'Bootstrap Node, enable corepack, activate pnpm, and configure best-effort pnpm store cache.'

inputs:
  node-version:
    description: 'Node.js major version to install'
    required: false
    default: '24'
  pnpm-version:
    description: 'pnpm version to activate via corepack'
    required: false
    default: '9.15.9'
  cache-enabled:
    description: 'Enable pnpm store cache (best-effort)'
    required: false
    default: 'true'
  cache-key-prefix:
    description: 'Prefix for the pnpm cache key'
    required: false
    default: 'pnpm'

outputs:
  pnpm-store-path:
    description: 'Path to the pnpm store directory'
    value: ${{ steps.pnpm-store.outputs.path }}

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable corepack
      shell: bash
      run: corepack enable

    - name: Activate pnpm
      shell: bash
      run: corepack prepare pnpm@${{ inputs.pnpm-version }} --activate

    - name: Expose pnpm store path
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      if: inputs.cache-enabled == 'true'
      continue-on-error: true
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-${{ inputs.cache-key-prefix }}-${{ hashFiles('pnpm-lock.yaml', '**/pnpm-lock.yaml') }}
        restore-keys: ${{ runner.os }}-${{ inputs.cache-key-prefix }}-
