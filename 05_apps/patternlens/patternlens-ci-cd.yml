name: PatternLens NUCLEAR Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # STAGE 1: Quality Gates
  # ============================================
  quality-gates:
    name: 🔍 Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint || true

      - name: Language Compliance Audit
        run: |
          echo "🔍 Scanning for FORBIDDEN therapeutic vocabulary..."
          FORBIDDEN_WORDS="therapy|therapeutic|diagnosis|treatment|wellness|mental health|help you|support you|heal|fix you|improve yourself|cope|relief|growth"
          
          # Scan src directory
          if grep -rniE "$FORBIDDEN_WORDS" src/ --include="*.tsx" --include="*.ts" 2>/dev/null; then
            echo "⚠️ WARNING: Forbidden vocabulary detected!"
            echo "PatternLens is a CONSTRUCTION TOOL, not therapy."
            # Don't fail build, just warn
          else
            echo "✅ Language compliance: PASSED"
          fi

      - name: Build Check
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ============================================
  # STAGE 2: Security Scan
  # ============================================
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Check for secrets in code
        run: |
          echo "🔍 Scanning for exposed secrets..."
          if grep -rniE "(sk-ant-|sk_live_|sk_test_|eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9)" src/ 2>/dev/null; then
            echo "🚨 CRITICAL: Exposed secrets detected!"
            exit 1
          else
            echo "✅ No exposed secrets found"
          fi

  # ============================================
  # STAGE 3: Deploy Preview (PRs only)
  # ============================================
  deploy-preview:
    name: 🚀 Deploy Preview
    runs-on: ubuntu-latest
    needs: [quality-gates]
    if: github.event_name == 'pull_request'
    steps:
      - name: Trigger Vercel Preview
        run: echo "Vercel auto-deploys previews via GitHub integration"

  # ============================================
  # STAGE 4: Production Deploy (main only)
  # ============================================
  deploy-production:
    name: 🚀 Production Deploy
    runs-on: ubuntu-latest
    needs: [quality-gates, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Production Deployment
        run: |
          echo "✅ Vercel auto-deploys production via GitHub integration"
          echo "📊 Deployment will appear at: https://patternlens.app"

      - name: Notify Success
        run: |
          echo "🎉 NUCLEAR DEPLOYMENT COMPLETE"
          echo "Stack: Next.js 16.1.3 + React 19.2.3 + Supabase"
          echo "Region: Frankfurt (EU)"

  # ============================================
  # STAGE 5: Post-Deploy Health Check
  # ============================================
  health-check:
    name: 💓 Health Check
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for deployment
        run: sleep 60

      - name: Check production health
        run: |
          echo "Checking https://patternlens.app..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://patternlens.app || echo "000")
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Production is healthy (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Production returned HTTP $HTTP_STATUS"
          fi

      - name: Check API health
        run: |
          echo "Checking API endpoint..."
          # Add specific API health check when endpoint exists
          echo "✅ API check skipped (endpoint not yet implemented)"
